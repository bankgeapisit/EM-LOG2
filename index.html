<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATTENDANCE</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Teko:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:     #0A0A0A;
  --panel:  #111111;
  --border: #2A2A2A;
  --border2:#3A3A3A;
  --text:   #F0EDE8;
  --muted:  #555550;
  --dim:    #888880;
  --green:  #4AFF8C;
  --red:    #FF4A4A;
  --white:  #FFFFFF;
}

html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); }

body {
  font-family: 'Share Tech Mono', monospace;
  color: var(--text);
  display: flex;
  flex-direction: column;
}

#scan-input {
  position: fixed; opacity:0; pointer-events:none;
  width:1px; height:1px; top:0; left:0;
}

/* ══ LAYOUT ══ */
.layout {
  display: grid;
  grid-template-columns: 200px 1fr;
  flex: 1;
  overflow: hidden;
  border-top: 1px solid var(--border);
}

/* ══ SIDEBAR ══ */
.sidebar {
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--panel);
}

.sidebar-section {
  border-bottom: 1px solid var(--border);
  padding: 10px 14px 8px;
}

.sidebar-label {
  font-size: 9px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 6px;
}

.log-scroll { flex:1; overflow-y:auto; }
.log-scroll::-webkit-scrollbar { width:2px; }
.log-scroll::-webkit-scrollbar-thumb { background: var(--border2); }

.log-row {
  display: grid;
  grid-template-columns: 28px 1fr 44px;
  border-bottom: 1px solid var(--border);
  align-items: center;
  opacity: 0;
  animation: rowIn 0.2s ease forwards;
}

@keyframes rowIn {
  from { opacity:0; transform:translateX(-4px); }
  to   { opacity:1; transform:translateX(0); }
}

.log-type {
  display: flex; align-items:center; justify-content:center;
  padding: 9px 0;
  border-right: 1px solid var(--border);
}

.log-dot {
  width: 5px; height: 5px; border-radius: 50%;
}
.log-dot.in  { background: var(--green); }
.log-dot.out { background: var(--red); }

.log-info {
  padding: 7px 10px;
  display: flex; flex-direction:column; gap:1px;
}

.log-emp  { font-size:11px; color:var(--text); letter-spacing:0.04em; }
.log-time { font-size:9px;  color:var(--muted); }

.log-badge-cell {
  display:flex; align-items:center; justify-content:center;
  border-left: 1px solid var(--border);
  padding: 0 4px;
}

.log-badge {
  font-size:8px; letter-spacing:0.1em;
  text-transform:uppercase;
}
.log-badge.in  { color:var(--green); }
.log-badge.out { color:var(--red); }

/* ══ MAIN ══ */
.main {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}

.main-body {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr auto;
  grid-template-rows: 1fr auto;
  padding: 0;
  overflow: hidden;
}

/* Clock area — left */
.clock-area {
  grid-column: 1;
  grid-row: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 0 40px 0 48px;
  border-right: 1px solid var(--border);
}

.clock-time {
  font-family: 'Teko', sans-serif;
  font-weight: 300;
  font-size: clamp(96px, 12vw, 160px);
  line-height: 0.88;
  letter-spacing: -0.02em;
  color: var(--white);
  transition: color 0.2s;
}

.clock-day {
  font-family: 'Teko', sans-serif;
  font-weight: 300;
  font-size: clamp(48px, 5.5vw, 72px);
  line-height: 1;
  letter-spacing: 0.04em;
  color: var(--dim);
  margin-top: 8px;
}

.clock-date {
  font-family: 'Teko', sans-serif;
  font-weight: 300;
  font-size: clamp(48px, 5.5vw, 72px);
  line-height: 1;
  letter-spacing: 0.04em;
  color: var(--dim);
}

/* Log preview under clock */
.log-preview {
  grid-column: 1;
  grid-row: 2;
  border-top: 1px solid var(--border);
  border-right: 1px solid var(--border);
  padding: 12px 48px;
  display: flex;
  gap: 48px;
  align-items: center;
}

.log-preview-group { display:flex; flex-direction:column; gap:3px; }

.log-preview-label {
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 4px;
}

.log-preview-item {
  display: flex; gap:16px; align-items:baseline;
}

.lp-emp  { font-size:12px; color:var(--text); min-width:72px; }
.lp-time { font-size:11px; color:var(--muted); }

/* Right panel — scan status */
.scan-panel {
  grid-column: 2;
  grid-row: 1 / 3;
  width: 240px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 32px 24px;
  gap: 20px;
}

.scan-panel-label {
  font-size: 9px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 12px;
}

/* Status indicator */
.status-block {
  border: 1px solid var(--border2);
  padding: 16px;
  position: relative;
  overflow: hidden;
  transition: border-color 0.2s;
}

.status-block::before {
  content: '';
  position: absolute;
  left:0; top:0; bottom:0;
  width: 2px;
  background: var(--muted);
  transition: background 0.2s;
}

.status-block.mode-in  { border-color:#2A4A35; }
.status-block.mode-in::before  { background: var(--green); }
.status-block.mode-out { border-color:#4A2A2A; }
.status-block.mode-out::before { background: var(--red); }

.status-mode {
  font-family: 'Teko', sans-serif;
  font-weight: 500;
  font-size: 28px;
  letter-spacing: 0.08em;
  color: var(--text);
  line-height: 1;
  margin-bottom: 4px;
  transition: color 0.2s;
}

.status-mode.in  { color: var(--green); }
.status-mode.out { color: var(--red); }

.status-step { font-size:10px; color:var(--muted); letter-spacing:0.1em; }
.status-hint { font-size:10px; color:var(--dim);   margin-top:6px; letter-spacing:0.06em; line-height:1.5; }

/* Ready pulse */
.pulse-row { display:flex; align-items:center; gap:7px; margin-top:12px; }
.pulse-dot {
  width:5px; height:5px; border-radius:50%;
  background: var(--muted);
  transition: background 0.2s;
}
.pulse-dot.active {
  background: var(--green);
  animation: pulse 1.4s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.2} }

.pulse-label { font-size:9px; letter-spacing:0.16em; color:var(--muted); text-transform:uppercase; }

/* ══ BOTTOM BAR ══ */
.bottombar {
  height: 32px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: stretch;
  flex-shrink: 0;
}

.bb-cell {
  display:flex; align-items:center; gap:10px;
  padding: 0 16px;
  border-right: 1px solid var(--border);
}

.bb-label { font-size:9px; letter-spacing:0.16em; color:var(--muted); text-transform:uppercase; }
.bb-value { font-size:10px; color:var(--text); }
.bb-in    { color:var(--green); }
.bb-out   { color:var(--red); }

/* ══ SUCCESS FLASH ══ */
.flash-overlay {
  position:fixed; inset:0;
  display:flex; align-items:center; justify-content:center;
  background:rgba(0,0,0,0.85);
  opacity:0; pointer-events:none; z-index:100;
}
.flash-overlay.show { animation: fshow 0.9s ease forwards; }

@keyframes fshow {
  0%   { opacity:0; }
  15%  { opacity:1; }
  70%  { opacity:1; }
  100% { opacity:0; }
}

.flash-card {
  text-align:center;
  transform: translateY(10px);
  animation: fcard 0.9s ease forwards;
}

@keyframes fcard {
  0%   { transform:translateY(10px); opacity:0; }
  15%  { transform:translateY(0);    opacity:1; }
  70%  { transform:translateY(0);    opacity:1; }
  100% { transform:translateY(-6px); opacity:0; }
}

.flash-type {
  font-size:10px; letter-spacing:0.24em;
  text-transform:uppercase; color:var(--muted);
  margin-bottom:8px;
}

.flash-emp {
  font-family:'Teko', sans-serif;
  font-weight:500; font-size:72px;
  letter-spacing:0.04em; line-height:1;
  color:var(--white);
}

.flash-time {
  font-size:14px; color:var(--dim);
  margin-top:10px; letter-spacing:0.1em;
}

.flash-line {
  height:1px; background:var(--border2);
  margin-top:20px;
  animation: linegrow 0.3s 0.15s ease forwards;
  transform-origin: left;
  transform: scaleX(0);
}

@keyframes linegrow { to { transform:scaleX(1); } }
</style>
</head>
<body>

<input id="scan-input" type="text" autocomplete="off" />

<div class="flash-overlay" id="flash">
  <div class="flash-card">
    <div class="flash-type" id="f-type">CHECK IN</div>
    <div class="flash-emp"  id="f-emp">EMP001</div>
    <div class="flash-time" id="f-time">09:01:23</div>
    <div class="flash-line"></div>
  </div>
</div>

<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">Log — <span id="log-count">0</span></div>
    </div>
    <div class="log-scroll" id="log-scroll"></div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="main-body">

      <!-- Clock -->
      <div class="clock-area">
        <div class="clock-time" id="clock">00:00:00</div>
        <div class="clock-day"  id="clock-day">MON</div>
        <div class="clock-date" id="clock-date">JAN 01</div>
      </div>

      <!-- Log preview bottom-left -->
      <div class="log-preview">
        <div class="log-preview-group">
          <div class="log-preview-label">Check In</div>
          <div id="preview-in">—</div>
        </div>
        <div class="log-preview-group">
          <div class="log-preview-label">Check Out</div>
          <div id="preview-out">—</div>
        </div>
      </div>

      <!-- Scan panel right -->
      <div class="scan-panel">
        <div>
          <div class="scan-panel-label">Scan Terminal</div>
          <div class="status-block" id="status-block">
            <div class="status-mode" id="status-mode">STANDBY</div>
            <div class="status-step" id="status-step">STEP 01 / 02</div>
            <div class="status-hint" id="status-hint">ยิง QR CHECK IN<br>หรือ CHECK OUT</div>
            <div class="pulse-row">
              <div class="pulse-dot" id="pulse-dot"></div>
              <span class="pulse-label" id="pulse-label">WAITING</span>
            </div>
          </div>
        </div>
      </div>

    </div>

    <!-- BOTTOM BAR -->
    <div class="bottombar">
      <div class="bb-cell">
        <span class="bb-label">Station</span>
        <span class="bb-value">MAIN — 01</span>
      </div>
      <div class="bb-cell">
        <span class="bb-label">In</span>
        <span class="bb-value bb-in" id="bb-in">0</span>
      </div>
      <div class="bb-cell">
        <span class="bb-label">Out</span>
        <span class="bb-value bb-out" id="bb-out">0</span>
      </div>
      <div class="bb-cell">
        <span class="bb-label">Last</span>
        <span class="bb-value" id="bb-last">—</span>
      </div>
    </div>
  </div>

</div>

<script>
let mode = null, records = [], cIn = 0, cOut = 0;
let buf = '', bufTimer = null;

// Clock
function tick() {
  const n = new Date();
  document.getElementById('clock').textContent =
    n.toLocaleTimeString('en-GB', {hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
  document.getElementById('clock-day').textContent =
    n.toLocaleDateString('en-GB', {weekday:'short'}).toUpperCase();
  document.getElementById('clock-date').textContent =
    n.toLocaleDateString('en-GB', {month:'short',day:'2-digit'}).toUpperCase().replace(' ','\u00A0');
}
setInterval(tick, 1000); tick();

// Focus
const inp = document.getElementById('scan-input');
function focus() { inp.focus(); }
document.addEventListener('click', focus);
window.addEventListener('load', focus);

// Scanner
inp.addEventListener('input', e => {
  buf += e.target.value; inp.value = '';
  clearTimeout(bufTimer);
  bufTimer = setTimeout(() => { if(buf.trim()){handleScan(buf.trim());buf='';} }, 80);
});
inp.addEventListener('keydown', e => {
  if(e.key==='Enter'){
    clearTimeout(bufTimer);
    const v=(buf+inp.value).trim(); inp.value=''; buf='';
    if(v) handleScan(v);
  }
});

function handleScan(v) {
  const u = v.toUpperCase();
  if(u==='MODE:IN'||u==='CHECKIN')  { setMode('in');  return; }
  if(u==='MODE:OUT'||u==='CHECKOUT'){ setMode('out'); return; }
  if(!mode) { document.getElementById('status-hint').textContent='ยิง QR CHECK IN / CHECK OUT ก่อน'; return; }
  record(v, mode);
}

function setMode(m) {
  mode = m;
  const block = document.getElementById('status-block');
  const modeEl = document.getElementById('status-mode');
  block.className  = 'status-block mode-' + m;
  modeEl.className = 'status-mode ' + m;
  modeEl.textContent = m==='in' ? 'CHECK IN' : 'CHECK OUT';
  document.getElementById('status-step').textContent = 'STEP 02 / 02';
  document.getElementById('status-hint').textContent = 'ยิงบัตรพนักงาน';
  document.getElementById('pulse-dot').className   = 'pulse-dot active';
  document.getElementById('pulse-label').textContent = 'READY';
  focus();
}

function resetMode() {
  mode = null;
  document.getElementById('status-block').className = 'status-block';
  const modeEl = document.getElementById('status-mode');
  modeEl.className = 'status-mode'; modeEl.textContent = 'STANDBY';
  document.getElementById('status-step').textContent = 'STEP 01 / 02';
  document.getElementById('status-hint').textContent = 'ยิง QR CHECK IN\nหรือ CHECK OUT';
  document.getElementById('pulse-dot').className    = 'pulse-dot';
  document.getElementById('pulse-label').textContent = 'WAITING';
}

function record(emp, type) {
  const n = new Date();
  const t = n.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
  const d = n.toLocaleDateString('en-GB',{day:'2-digit',month:'short'}).toUpperCase();
  records.unshift({emp,type,t,d});
  if(type==='in') cIn++; else cOut++;
  renderLog(); updatePreview(); showFlash(emp,type,t);
  document.getElementById('bb-in').textContent  = cIn;
  document.getElementById('bb-out').textContent = cOut;
  document.getElementById('bb-last').textContent = emp;
  setTimeout(resetMode, 1000);
}

function showFlash(emp,type,t) {
  document.getElementById('f-type').textContent = type==='in' ? 'CHECK IN' : 'CHECK OUT';
  document.getElementById('f-emp').textContent  = emp;
  document.getElementById('f-time').textContent = t;
  const fl = document.getElementById('flash');
  fl.className = 'flash-overlay';
  void fl.offsetWidth;
  fl.className = 'flash-overlay show';
  setTimeout(()=>{ fl.className='flash-overlay'; }, 950);
}

function renderLog() {
  document.getElementById('log-count').textContent = records.length;
  document.getElementById('log-scroll').innerHTML = records.slice(0,40).map(r=>`
    <div class="log-row">
      <div class="log-type"><div class="log-dot ${r.type}"></div></div>
      <div class="log-info">
        <div class="log-emp">${r.emp}</div>
        <div class="log-time">${r.t}</div>
      </div>
      <div class="log-badge-cell"><span class="log-badge ${r.type}">${r.type==='in'?'IN':'OUT'}</span></div>
    </div>`).join('');
}

function updatePreview() {
  const ins  = records.filter(r=>r.type==='in').slice(0,3);
  const outs = records.filter(r=>r.type==='out').slice(0,3);
  const fmt  = arr => arr.length
    ? arr.map(r=>`<div class="log-preview-item"><span class="lp-emp">${r.emp}</span><span class="lp-time">${r.t}</span></div>`).join('')
    : '<span class="lp-time">—</span>';
  document.getElementById('preview-in').innerHTML  = fmt(ins);
  document.getElementById('preview-out').innerHTML = fmt(outs);
}

focus();
</script>
</body>
</html>
